name: city_market
description: Kigali City Services & Places Directory
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

  # State Management
  provider: ^6.1.1

  # Maps & Location
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  geolocator: ^14.0.2
  url_launcher: ^6.2.2

  # UI
  cupertino_icons: ^1.0.2
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  uuid: ^4.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true